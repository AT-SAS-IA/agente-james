version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    image: <TU_REGISTRO_O_USUARIO_DOCKER>/james-api:latest
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

volumes:
  qdrant_data:
